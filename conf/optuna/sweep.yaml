n_trials: 20
direction: maximize
output_dir: .optuna_runs
search_space:
  heterogeneity.alpha:
    type: float
    low: 0.01
    high: 100.0
    log: true
  topology.sampling:
    type: float
    low: 0.01
    high: 1.0
    log: true
  sampler.name:
    type: categorical
    choices: [uniform, epsilon_greedy, exp3]
  sampler.params.epsilon:
    type: float
    low: 0.01
    high: 0.99
    log: true
    when:
      sampler.name: epsilon_greedy
  sampler.params.gamma:
    type: categorical
    choices: [auto, 0.01, 0.05, 0.1]
    when:
      sampler.name: exp3
