direction: maximize
search_space:
  heterogeneity.alpha:
    name: alpha
    type: categorical
    choices: [0.1, 0.5]
  topology.sampling:
    type: categorical
    choices: [0.01, 0.1]
  sampler.name:
    name: sampler
    type: categorical
    choices: [uniform, epsilon_greedy]
  sampler.params.epsilon:
    name: epsilon
    type: categorical
    choices: [0.1]
    when:
      sampler.name: epsilon_greedy
