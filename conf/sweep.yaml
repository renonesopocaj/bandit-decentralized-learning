defaults:
  - config
  - optuna: sanitysweep
  - _self_

# Sweep plotting controls. Keep this explicit so large sweeps do not
# accidentally generate every supported visualization.
plot_mode:
  - per_parameter
  - all_together
  - heatmap

# avg = mean over saved timesteps/nodes inside each seed, then mean over seeds.
# worse = worst scalar inside each seed, using max for losses/regret/drift and
# min for accuracy-like metrics, then mean over seeds.
# best = opposite of worse: min for losses/regret/drift and max for accuracy-like
# metrics, then mean over seeds.
direction:
  - avg
  - worse
  - best

plot_metrics:
  - validation_accuracies
  - validation_losses
  - train_losses
  - reward_algorithm
  - reward_oracle
  - regret
  - normalized_regret
  - neighbor_disagreement
  - consensus_drift
  - gradient_norms
