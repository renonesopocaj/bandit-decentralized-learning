defaults:
  - config
  - optuna: sanitysweep
  - _self_

plot:
  enabled: true
  directions:
    - avg
    - worse

  # By default, sweep plots try every known scalar metric saved by the runs.
  # Individual plot specs can remove metrics with exclude_metrics.
  heatmaps:
    - x: heterogeneity.alpha
      y: topology.sampling
      group_by:
        - sampler.name
        - [sampler.name, sampler.params.epsilon]
      aggregate_by: avg
      render: [heatmap]
      exclude_metrics: []

  per_parameter:
    enabled: false
    exclude_metrics: []
