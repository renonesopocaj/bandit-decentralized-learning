defaults:
  - config
  - optuna: sanitysweep
  - _self_

# Sweep plotting controls. Keep this explicit so large sweeps do not
# accidentally generate every supported visualization.
plot_mode:
  - per_parameter
  - all_together
  - heatmap

# avg = mean over all saved timesteps/nodes.
# worse = worst scalar for the metric, using max for losses/regret/drift and
# min for accuracy-like metrics.
direction:
  - avg
  - worse

plot_metrics:
  - validation_accuracies
  - validation_losses
  - train_losses
  - reward_algorithm
  - reward_oracle
  - regret
  - normalized_regret
  - neighbor_disagreement
  - consensus_drift
