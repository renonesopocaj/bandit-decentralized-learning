defaults:
  - dataset: mnist
  - topology: dynamic
  - sampler: uniform
  - adversary: none
  - aggregator: mean
  - heterogeneity: dirichlet_alpha0.5
  - optimization: opt_mnist
  - evaluation: evaluation
  - _self_
  - override

seed: 123
num_seeds: 1
device: cpu

hydra:
  run:
    # The trailing token defaults to `local` and disambiguates runs started in the
    # same second; runs stay chronologically ordered by HH-MM-SS.
    dir: .hydra_runs/${now:%Y-%m-%d}/${now:%H-%M-%S}_${oc.env:JOB_ID,local}
  sweep:
    dir: .hydra_multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}_${oc.env:JOB_ID,local}
