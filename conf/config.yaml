defaults:
  - dataset: mnist
  - topology: dynamic
  - sampler: uniform
  - adversary: none
  - aggregator: mean
  - heterogeneity: alpha0.5
  - optimization: opt_mnist
  - evaluation: evaluation
  - _self_
  - override

seed: 123
device: cpu

hydra:
  run:
    # SLURM_JOB_ID suffix prevents collisions when many sweep jobs start within the same second.
    # Local (non-slurm) runs get `_local` and still order chronologically by HH-MM-SS.
    dir: .hydra_runs/${now:%Y-%m-%d}/${now:%H-%M-%S}_${oc.env:SLURM_JOB_ID,local}
  sweep:
    dir: .hydra_multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}_${oc.env:SLURM_JOB_ID,local}
